services:
  lens:
    build: .
    image: getbased-rag:local
    container_name: getbased-rag
    restart: unless-stopped
    ports:
      - "127.0.0.1:8322:8322"
    volumes:
      - lens-data:/data
    environment:
      LENS_HOST: 0.0.0.0
      LENS_PORT: 8322
      LENS_DATA_DIR: /data
      # LENS_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      # LENS_SIMILARITY_FLOOR: "0.55"
      # LENS_ONNX_PROVIDER: cpu

volumes:
  lens-data:
